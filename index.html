<!DOCTYPE html>
<html lang="fr">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-3YQSC47659"></script>

    <script>
    window.dataLayer = window.dataLayer || [];

    function gtag(){
        dataLayer.push(arguments);
    }

    gtag('js', new Date());

    gtag('config', 'G-3YQSC47659');
    </script>
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cap Contrôle</title>
    <link rel="icon" href="assets/logo.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="loginScreen">

        <h2>Cap Contrôle</h2>

        <input
            type="password"
            id="passwordInput"
            placeholder="Mot de passe"
        >

        <button onclick="checkPassword()">
            Connexion
        </button>

    </div>

    <div id="app" style="display:none;">

    <div class="container">

        <h1>
            Cap Contrôle
        </h1>

        <div id="dashboard" class="dashboard"></div>

        <div id="nextExam" class="card next-exam"></div>

        <div id="todayRevision" class="card today-revision"></div>

        <div class="card form">

            <input
                id="subject"
                type="text"
                placeholder="Matière"
            >

            <input
                id="chapter"
                type="text"
                placeholder="Chapitre"
            >

            <input
                id="date"
                type="date"
            >

            <button id="addBtn">
                Ajouter
            </button>

        </div>

        <div id="controls"></div>

        <div class="card ai-section">

            <textarea
                id="courseInput"
                placeholder="Colle ton cours ici..."
            ></textarea>

            <button
                class="generate-btn"
                onclick="generateRevisionSheet()">
                Générer ma fiche
            </button>

        </div>

        <div id="aiResult"></div>

        <div class="card">

            <h2>Importer une fiche</h2>

            <div class="share-import">

                <input
                    id="shareCode"
                    type="text"
                    placeholder="Code de partage">

                <button
                    id="importBtn"
                    onclick="importSheet()">
                    Importer
                </button>

            </div>

        </div>

        <div class="card">
            <h2>Historique des fiches</h2>

            <input
                type="text"
                id="historySearch"
                placeholder="Rechercher une fiche..."
                oninput="renderHistory()"
            >
        
            <div id="historyList"></div>
        </div>

    </div>

    <script src="script.js"></script>

    </div>

</body>
</html>
